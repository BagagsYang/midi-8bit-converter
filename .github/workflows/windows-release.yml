name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read app compatibility metadata
        shell: pwsh
        run: |
          [xml]$project = Get-Content "apps/windows/src/Midi8BitSynthesiser.App/Midi8BitSynthesiser.App.csproj"
          $props = $project.Project.PropertyGroup | Where-Object { $_.TargetFramework } | Select-Object -First 1
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME.TrimStart("v") } else { $props.Version }
          $minimumWindowsVersion = $props.TargetPlatformMinVersion
          $minimumWindowsBuild = $minimumWindowsVersion.Split(".")[2]
          $runtimeIdentifier = $props.RuntimeIdentifier
          $supportedArchitecture = $runtimeIdentifier.Split("-")[-1]

          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "APP_MINIMUM_WINDOWS_VERSION=$minimumWindowsVersion" >> $env:GITHUB_ENV
          "APP_MINIMUM_WINDOWS_BUILD=$minimumWindowsBuild" >> $env:GITHUB_ENV
          "APP_RUNTIME_IDENTIFIER=$runtimeIdentifier" >> $env:GITHUB_ENV
          "APP_SUPPORTED_ARCHITECTURE=$supportedArchitecture" >> $env:GITHUB_ENV

      - name: Install Python dependencies
        run: python -m pip install -r core/python-renderer/requirements.txt

      - name: Restore solution
        run: dotnet restore apps/windows/Midi8BitSynthesiser.sln

      - name: Build solution
        run: dotnet build apps/windows/Midi8BitSynthesiser.sln -c Release -p:Platform=x64 --no-restore

      - name: Run tests
        run: dotnet test apps/windows/Midi8BitSynthesiser.sln -c Release -p:Platform=x64 --no-build

      - name: Publish WinUI app
        run: >
          dotnet publish
          apps/windows/src/Midi8BitSynthesiser.App/Midi8BitSynthesiser.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Platform=x64
          --no-build
          -o apps/windows/artifacts/publish/win-x64

      - name: Zip publish output
        shell: pwsh
        run: |
          $artifactDir = "apps/windows/artifacts"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          Compress-Archive -Path "apps/windows/artifacts/publish/win-x64/*" -DestinationPath "$artifactDir/Midi8BitSynthesiser-win-x64.zip" -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $publishDir = (Resolve-Path "apps/windows/artifacts/publish/win-x64").Path
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc `
            "/DAppVersion=$env:APP_VERSION" `
            "/DPublishDir=$publishDir" `
            "/DMinimumWindowsVersion=$env:APP_MINIMUM_WINDOWS_VERSION" `
            "/DMinimumWindowsBuild=$env:APP_MINIMUM_WINDOWS_BUILD" `
            "/DSupportedArchitecture=$env:APP_SUPPORTED_ARCHITECTURE" `
            "apps/windows/installer/Midi8BitSynthesiser.iss"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Midi8BitSynthesiser-win-x64
          path: |
            apps/windows/artifacts/Midi8BitSynthesiser-win-x64.zip
            apps/windows/artifacts/installer/*.exe
          if-no-files-found: error
